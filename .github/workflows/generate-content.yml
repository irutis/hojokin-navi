name: 自律コンテンツ生成・データ同期

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日JST 10:00に実行
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: J-Grantsデータ同期
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/sync-jgrants.mjs

      - name: コンテンツ自動生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-content.mjs

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "hojokin-navi-bot"
          git config user.email "bot@hojokin-guide.jp"
          git add -A
          git diff --staged --quiet || git commit -m "auto: 補助金データ・コンテンツ自動更新 $(date '+%Y-%m-%d')"
          git push
